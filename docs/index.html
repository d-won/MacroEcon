<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기 선행 지표 기업 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d29;
  --border: #2a2d3a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #4f8ff7;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
.container { max-width: 1400px; margin: 0 auto; padding: 16px; }

/* Header */
header {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 0;
  margin-bottom: 20px;
}
header .container { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
header h1 { font-size: 1.4rem; font-weight: 700; }
header h1 span { font-size: 1.6rem; margin-right: 8px; }
.updated { font-size: 0.8rem; color: var(--text-dim); }

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.tab {
  padding: 10px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 0.9rem;
  color: var(--text-dim);
  transition: all 0.2s;
}
.tab:hover { border-color: var(--accent); color: var(--text); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* KPI Cards */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}
.kpi-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
.kpi-value { font-size: 1.5rem; font-weight: 700; }
.kpi-value.positive { color: var(--green); }
.kpi-value.negative { color: var(--red); }

/* Table */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  white-space: nowrap;
}
th {
  background: #1e2235;
  position: sticky;
  top: 0;
  padding: 12px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
th:hover { color: var(--accent); }
td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
tr:hover { background: rgba(79,143,247,0.05); }
.pos { color: var(--green); font-weight: 600; }
.neg { color: var(--red); font-weight: 600; }

/* Filters */
.filters {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-group label {
  display: block;
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.filter-group select {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 0.85rem;
}

/* Chart container */
.chart-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 20px;
}
.chart-box canvas { max-height: 500px; }

/* Sector cards */
.sector-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 14px;
}
.sector-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
}
.sector-card h3 {
  font-size: 1rem;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.sector-company {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 0.85rem;
}

/* Company detail */
.detail-header {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 16px;
}
.detail-header h2 { margin-bottom: 6px; }
.detail-meta { color: var(--text-dim); font-size: 0.85rem; }
.detail-reason {
  background: rgba(79,143,247,0.1);
  border-left: 3px solid var(--accent);
  padding: 12px 16px;
  border-radius: 0 8px 8px 0;
  margin-top: 12px;
  font-size: 0.9rem;
}
.detail-metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  margin-top: 14px;
}
.detail-metric {
  text-align: center;
  padding: 10px;
  background: var(--bg);
  border-radius: 8px;
}

/* Download section */
.download-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.download-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  text-align: center;
}
.download-card h3 { margin-bottom: 8px; }
.download-card p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 16px; }
.btn {
  display: inline-block;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }

/* Mobile */
@media (max-width: 768px) {
  .container { padding: 10px; }
  header h1 { font-size: 1.1rem; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .kpi-value { font-size: 1.2rem; }
  table { font-size: 0.75rem; }
  th, td { padding: 8px 10px; }
  .tab { padding: 8px 14px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <h1><span>📊</span> 경기 선행 지표 기업 대시보드</h1>
    <div class="updated">마지막 업데이트: 2026-03-17 12:40:28</div>
  </div>
</header>

<div class="container">
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="overview">📈 종합 현황</div>
    <div class="tab" data-tab="chart">📉 주가 차트</div>
    <div class="tab" data-tab="sector">🏭 섹터 분석</div>
    <div class="tab" data-tab="detail">🔍 기업 상세</div>
    <div class="tab" data-tab="download">💾 CSV 다운로드</div>
  </div>

  <!-- ===== 종합 현황 ===== -->
  <div class="tab-content active" id="tab-overview">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="filters">
      <div class="filter-group">
        <label>섹터</label>
        <select id="filter-sector"><option value="all">전체</option></select>
      </div>
      <div class="filter-group">
        <label>국가</label>
        <select id="filter-country"><option value="all">전체</option></select>
      </div>
    </div>
    <div class="table-wrap">
      <table id="summary-table">
        <thead><tr id="summary-header"></tr></thead>
        <tbody id="summary-body"></tbody>
      </table>
    </div>
  </div>

  <!-- ===== 주가 차트 ===== -->
  <div class="tab-content" id="tab-chart">
    <div class="filters">
      <div class="filter-group">
        <label>섹터 필터</label>
        <select id="chart-sector-filter"><option value="all">전체</option></select>
      </div>
      <div class="filter-group">
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="chart-normalize" checked> 정규화 (시작=100)
        </label>
      </div>
    </div>
    <div class="chart-box">
      <canvas id="priceChart"></canvas>
    </div>
  </div>

  <!-- ===== 섹터 분석 ===== -->
  <div class="tab-content" id="tab-sector">
    <div class="filters">
      <div class="filter-group">
        <label>기간</label>
        <select id="sector-period">
          <option value="Change_1D_pct">1일</option>
          <option value="Change_1W_pct">1주</option>
          <option value="Change_1M_pct" selected>1개월</option>
          <option value="Change_3M_pct">3개월</option>
        </select>
      </div>
    </div>
    <div class="chart-box">
      <canvas id="sectorChart"></canvas>
    </div>
    <div class="sector-grid" id="sector-grid"></div>
  </div>

  <!-- ===== 기업 상세 ===== -->
  <div class="tab-content" id="tab-detail">
    <div class="filters">
      <div class="filter-group">
        <label>기업 선택</label>
        <select id="detail-select"></select>
      </div>
    </div>
    <div id="detail-content"></div>
    <div class="chart-box">
      <canvas id="detailChart"></canvas>
    </div>
  </div>

  <!-- ===== CSV 다운로드 ===== -->
  <div class="tab-content" id="tab-download">
    <div class="download-grid">
      <div class="download-card">
        <h3>📋 기업 요약 데이터</h3>
        <p>현재가, 변동률, 시가총액, PER 등</p>
        <button class="btn" onclick="downloadCSV('summary')">📥 다운로드</button>
      </div>
      <div class="download-card">
        <h3>📈 주가 히스토리</h3>
        <p>일별 시가·고가·저가·종가·거래량</p>
        <button class="btn" onclick="downloadCSV('prices')">📥 다운로드</button>
      </div>
      <div class="download-card">
        <h3>🏢 기업 목록</h3>
        <p>20개 선행 기업 메타데이터 및 선행 근거</p>
        <button class="btn" onclick="downloadCSV('companies')">📥 다운로드</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── 데이터 ──
const summaryData = [];
const pricesData = {};
const companiesData = [{"ticker": "FDX", "name": "FedEx", "sector": "운송/물류", "country": "US", "reason": "글로벌 물동량의 바로미터. 기업간 화물량이 경기에 3~6개월 선행"}, {"ticker": "UPS", "name": "UPS", "sector": "운송/물류", "country": "US", "reason": "소비재·산업재 배송량으로 내수 경기 선행 파악"}, {"ticker": "MAERSK-B.CO", "name": "A.P. Moller-Maersk", "sector": "운송/물류", "country": "DK", "reason": "세계 최대 해운사. 컨테이너 물동량이 글로벌 무역 선행"}, {"ticker": "TSM", "name": "TSMC", "sector": "반도체", "country": "TW", "reason": "파운드리 주문량이 IT·산업 전반 설비투자 사이클 선행"}, {"ticker": "005930.KS", "name": "삼성전자", "sector": "반도체", "country": "KR", "reason": "메모리 반도체 가격·재고가 글로벌 IT 경기 선행"}, {"ticker": "ASML", "name": "ASML", "sector": "반도체", "country": "NL", "reason": "반도체 장비 주문이 칩 수요 사이클에 12~18개월 선행"}, {"ticker": "CAT", "name": "Caterpillar", "sector": "산업재/건설", "country": "US", "reason": "건설·광업 장비 주문이 인프라·원자재 사이클 선행"}, {"ticker": "URI", "name": "United Rentals", "sector": "산업재/건설", "country": "US", "reason": "장비 임대율이 건설·산업 활동 선행 지표"}, {"ticker": "MMM", "name": "3M", "sector": "산업재/건설", "country": "US", "reason": "산업용 소재 수요가 제조업 경기 선행"}, {"ticker": "BASFY", "name": "BASF", "sector": "화학/소재", "country": "DE", "reason": "세계 최대 화학 기업. 화학 제품 수요가 제조업 사이클 선행"}, {"ticker": "DD", "name": "DuPont", "sector": "화학/소재", "country": "US", "reason": "전자·건설·자동차 소재 수요로 다수 산업 경기 선행 파악"}, {"ticker": "LIN", "name": "Linde", "sector": "화학/소재", "country": "IE", "reason": "산업용 가스 수요가 제조업·에너지 활동 선행"}, {"ticker": "GS", "name": "Goldman Sachs", "sector": "금융", "country": "US", "reason": "IB 딜 파이프라인·트레이딩 수익이 자본시장 사이클 선행"}, {"ticker": "V", "name": "Visa", "sector": "금융", "country": "US", "reason": "카드 결제량이 소비 지출 트렌드 실시간 선행 지표"}, {"ticker": "RHI", "name": "Robert Half", "sector": "채용/인력", "country": "US", "reason": "임시직 수요가 정규직 고용·실업률에 3~6개월 선행"}, {"ticker": "MAN", "name": "ManpowerGroup", "sector": "채용/인력", "country": "US", "reason": "글로벌 인력 수급 지표가 고용 시장 전환점 선행"}, {"ticker": "HD", "name": "Home Depot", "sector": "소비재", "country": "US", "reason": "주택 개보수 지출이 주택 시장·소비 경기 선행"}, {"ticker": "RACE", "name": "Ferrari", "sector": "소비재", "country": "IT", "reason": "초고가 소비재 수요가 부유층 심리·자산효과 선행 지표"}, {"ticker": "BHP", "name": "BHP Group", "sector": "원자재/에너지", "country": "AU", "reason": "철광석·구리 생산량이 중국·글로벌 산업 활동 선행"}, {"ticker": "FCX", "name": "Freeport-McMoRan", "sector": "원자재/에너지", "country": "US", "reason": "구리 가격·수요가 'Dr. Copper'로서 경기 선행"}];
const companyMap = {};
companiesData.forEach(c => companyMap[c.ticker] = c);

// ── 탭 전환 ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── 유틸 ──
function fmt(v, decimals=2) {
  if (v == null || isNaN(v)) return '-';
  return Number(v).toFixed(decimals);
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return '-';
  const n = Number(v);
  const sign = n > 0 ? '+' : '';
  return sign + n.toFixed(2) + '%';
}
function pctClass(v) {
  if (v == null || isNaN(v)) return '';
  return Number(v) > 0 ? 'pos' : Number(v) < 0 ? 'neg' : '';
}
function fmtCap(v) {
  if (!v || isNaN(v)) return '-';
  if (v >= 1e12) return '$' + (v/1e12).toFixed(1) + 'T';
  if (v >= 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
  return '$' + (v/1e6).toFixed(0) + 'M';
}

// Chart.js 색상 팔레트
const COLORS = [
  '#4f8ff7','#22c55e','#ef4444','#eab308','#a855f7',
  '#ec4899','#06b6d4','#f97316','#84cc16','#6366f1',
  '#14b8a6','#f43f5e','#8b5cf6','#0ea5e9','#d946ef',
  '#64748b','#fb923c','#34d399','#fbbf24','#f87171'
];

// ── KPI 카드 ──
function renderKPI() {
  const row = document.getElementById('kpi-row');
  if (!summaryData.length) return;
  const metrics = [
    ['평균 1일 변동률', 'Change_1D_pct'],
    ['평균 1주 변동률', 'Change_1W_pct'],
    ['평균 1개월 변동률', 'Change_1M_pct'],
    ['평균 3개월 변동률', 'Change_3M_pct'],
  ];
  row.innerHTML = metrics.map(([label, key]) => {
    const vals = summaryData.map(d => d[key]).filter(v => v != null && !isNaN(v));
    const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
    const cls = avg > 0 ? 'positive' : avg < 0 ? 'negative' : '';
    return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value ${cls}">${fmtPct(avg)}</div></div>`;
  }).join('');
}

// ── 필터 초기화 ──
function initFilters() {
  const sectors = [...new Set(summaryData.map(d => d.Sector))].sort();
  const countries = [...new Set(summaryData.map(d => d.Country))].sort();

  ['filter-sector','chart-sector-filter'].forEach(id => {
    const sel = document.getElementById(id);
    if(!sel) return;
    sectors.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
  });

  const countrySel = document.getElementById('filter-country');
  countries.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    countrySel.appendChild(opt);
  });

  // 기업 상세 드롭다운
  const detailSel = document.getElementById('detail-select');
  summaryData.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.Ticker;
    opt.textContent = `${d.Ticker} - ${d.Name}`;
    detailSel.appendChild(opt);
  });
}

// ── 요약 테이블 ──
const TABLE_COLS = [
  {key:'Ticker', label:'티커', sort:'string'},
  {key:'Name', label:'기업명', sort:'string'},
  {key:'Sector', label:'섹터', sort:'string'},
  {key:'Country', label:'국가', sort:'string'},
  {key:'Current_Price', label:'현재가', sort:'number', fmt: v => fmt(v)},
  {key:'Change_1D_pct', label:'1일 %', sort:'number', fmt: fmtPct, cls: pctClass},
  {key:'Change_1W_pct', label:'1주 %', sort:'number', fmt: fmtPct, cls: pctClass},
  {key:'Change_1M_pct', label:'1개월 %', sort:'number', fmt: fmtPct, cls: pctClass},
  {key:'Change_3M_pct', label:'3개월 %', sort:'number', fmt: fmtPct, cls: pctClass},
  {key:'Market_Cap', label:'시가총액', sort:'number', fmt: fmtCap},
  {key:'PE_Ratio', label:'PER', sort:'number', fmt: v => fmt(v,1)},
];

let sortCol = null, sortAsc = true;

function renderTable() {
  const sector = document.getElementById('filter-sector').value;
  const country = document.getElementById('filter-country').value;

  let data = summaryData.filter(d =>
    (sector === 'all' || d.Sector === sector) &&
    (country === 'all' || d.Country === country)
  );

  if (sortCol !== null) {
    const col = TABLE_COLS[sortCol];
    data.sort((a, b) => {
      let va = a[col.key], vb = b[col.key];
      if (col.sort === 'number') {
        va = va == null ? -Infinity : Number(va);
        vb = vb == null ? -Infinity : Number(vb);
        return sortAsc ? va - vb : vb - va;
      }
      va = (va || '').toString(); vb = (vb || '').toString();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  const header = document.getElementById('summary-header');
  header.innerHTML = TABLE_COLS.map((c, i) =>
    `<th onclick="sortTable(${i})">${c.label} ${sortCol === i ? (sortAsc ? '▲' : '▼') : ''}</th>`
  ).join('');

  const body = document.getElementById('summary-body');
  body.innerHTML = data.map(d =>
    '<tr>' + TABLE_COLS.map(c => {
      const val = d[c.key];
      const display = c.fmt ? c.fmt(val) : (val ?? '-');
      const cls = c.cls ? c.cls(val) : '';
      return `<td class="${cls}">${display}</td>`;
    }).join('') + '</tr>'
  ).join('');
}

function sortTable(colIdx) {
  if (sortCol === colIdx) sortAsc = !sortAsc;
  else { sortCol = colIdx; sortAsc = true; }
  renderTable();
}

// ── 주가 차트 ──
let priceChart = null;
function renderPriceChart() {
  const sectorFilter = document.getElementById('chart-sector-filter').value;
  const normalize = document.getElementById('chart-normalize').checked;

  const tickers = Object.keys(pricesData).filter(t => {
    if (sectorFilter === 'all') return true;
    const info = companyMap[t];
    return info && info.sector === sectorFilter;
  });

  const datasets = tickers.map((ticker, i) => {
    const d = pricesData[ticker];
    let values = d.close;
    if (normalize && values.length > 0) {
      const base = values[0];
      values = values.map(v => base > 0 ? (v / base * 100) : v);
    }
    return {
      label: d.name || ticker,
      data: values,
      borderColor: COLORS[i % COLORS.length],
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
      fill: false,
    };
  });

  const labels = tickers.length > 0 ? pricesData[tickers[0]].dates : [];

  if (priceChart) priceChart.destroy();
  priceChart = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { color: '#888', boxWidth: 12, font: {size: 11} } },
        tooltip: { backgroundColor: '#1a1d29', titleColor: '#e0e0e0', bodyColor: '#e0e0e0', borderColor: '#2a2d3a', borderWidth: 1 },
      },
      scales: {
        x: { ticks: { color: '#666', maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#666' }, grid: { color: 'rgba(255,255,255,0.05)' } },
      },
    },
  });
  document.getElementById('priceChart').parentElement.style.height = '500px';
}

// ── 섹터 분석 ──
let sectorChart = null;
function renderSectorAnalysis() {
  const periodKey = document.getElementById('sector-period').value;
  const periodLabel = {'Change_1D_pct':'1일','Change_1W_pct':'1주','Change_1M_pct':'1개월','Change_3M_pct':'3개월'}[periodKey];

  // 섹터별 평균
  const sectorMap = {};
  summaryData.forEach(d => {
    if (!sectorMap[d.Sector]) sectorMap[d.Sector] = [];
    if (d[periodKey] != null) sectorMap[d.Sector].push(d[periodKey]);
  });

  const sectors = Object.keys(sectorMap).sort((a,b) => {
    const avgA = sectorMap[a].reduce((s,v) => s+v, 0) / sectorMap[a].length;
    const avgB = sectorMap[b].reduce((s,v) => s+v, 0) / sectorMap[b].length;
    return avgA - avgB;
  });

  const avgs = sectors.map(s => {
    const vals = sectorMap[s];
    return +(vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2);
  });

  const bgColors = avgs.map(v => v > 0 ? 'rgba(34,197,94,0.7)' : 'rgba(239,68,68,0.7)');

  if (sectorChart) sectorChart.destroy();
  sectorChart = new Chart(document.getElementById('sectorChart'), {
    type: 'bar',
    data: {
      labels: sectors,
      datasets: [{ label: `평균 ${periodLabel} 변동률 (%)`, data: avgs, backgroundColor: bgColors, borderRadius: 4 }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#1a1d29', titleColor: '#e0e0e0', bodyColor: '#e0e0e0' },
      },
      scales: {
        x: { ticks: { color: '#666' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#aaa' }, grid: { display: false } },
      },
    },
  });

  // 섹터 카드
  const grid = document.getElementById('sector-grid');
  grid.innerHTML = sectors.map(s => {
    const companies = summaryData.filter(d => d.Sector === s);
    const compHTML = companies.map(d =>
      `<div class="sector-company"><span>${d.Ticker} ${d.Name}</span><span class="${pctClass(d[periodKey])}">${fmtPct(d[periodKey])}</span></div>`
    ).join('');
    return `<div class="sector-card"><h3>${s}</h3>${compHTML}</div>`;
  }).join('');
}

        <div class="detail-metric"><div class="kpi-label">1주</div><div class="${pctClass(d.Change_1W_pct)}">${fmtPct(d.Change_1W_pct)}</div></div>
        <div class="detail-metric"><div class="kpi-label">1개월</div><div class="${pctClass(d.Change_1M_pct)}">${fmtPct(d.Change_1M_pct)}</div></div>
        <div class="detail-metric"><div class="kpi-label">3개월</div><div class="${pctClass(d.Change_3M_pct)}">${fmtPct(d.Change_3M_pct)}</div></div>

        },
        scales: {
          x: { ticks: { color: '#666', maxTicksLimit: 10 }, grid: { color: 'rgba(255,255,255,0.05)' } },
          y: { ticks: { color: '#666' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        },
      },
    });
  }
}

// ── CSV 다운로드 ──
function downloadCSV(type) {
  let csv = '', filename = '';
  const today = new Date().toISOString().slice(0,10);

  if (type === 'summary') {
    const cols = ['Ticker','Name','Sector','Country','Current_Price','Currency','Change_1D_pct','Change_1W_pct','Change_1M_pct','Change_3M_pct','Market_Cap','PE_Ratio','52W_High','52W_Low','Reason'];
    csv = '\uFEFF' + cols.join(',') + '\n';
    summaryData.forEach(d => {
      csv += cols.map(c => {
        let v = d[c] ?? '';
        if (typeof v === 'string' && (v.includes(',') || v.includes('"')))
          v = '"' + v.replace(/"/g, '""') + '"';
        return v;
      }).join(',') + '\n';
    });
    filename = `leading_companies_summary_${today}.csv`;
  }
  else if (type === 'prices') {
    const cols = ['Date','Ticker','Name','Close'];
    csv = '\uFEFF' + cols.join(',') + '\n';
    Object.entries(pricesData).forEach(([ticker, d]) => {
      d.dates.forEach((date, i) => {
        csv += `${date},${ticker},"${d.name}",${d.close[i]}\n`;
      });
    });
    filename = `leading_companies_prices_${today}.csv`;
  }
  else if (type === 'companies') {
    const cols = ['ticker','name','sector','country','reason'];
    csv = '\uFEFF' + cols.join(',') + '\n';
    companiesData.forEach(d => {
      csv += cols.map(c => {
        let v = d[c] ?? '';
        if (typeof v === 'string' && (v.includes(',') || v.includes('"')))
          v = '"' + v.replace(/"/g, '""') + '"';
        return v;
      }).join(',') + '\n';
    });
    filename = `leading_companies_list.csv`;
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
